<body>
    <div class="todo-container">
        <h1>간단 할 일</h1>
        <div class="input-group">
            <input type="text" id="new-todo-input" placeholder="새로운 할 일을 추가하세요">
            <button id="add-todo-btn">추가</button>
        </div>
        <ul class="todo-list" id="todo-list">
            <!-- 할 일 항목들이 여기에 추가됩니다 -->
        </ul>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const newTodoInput = document.getElementById('new-todo-input');
            const addTodoBtn = document.getElementById('add-todo-btn');
            const todoList = document.getElementById('todo-list');

            let todos = JSON.parse(localStorage.getItem('todos')) || [];

            function saveTodos() {
                localStorage.setItem('todos', JSON.stringify(todos));
            }

            function renderTodos() {
                todoList.innerHTML = ''; // 기존 목록 비우기
                todos.forEach((todo, index) => {
                    const listItem = document.createElement('li');
                    listItem.classList.add('todo-item');
                    if (todo.completed) {
                        listItem.classList.add('completed');
                    }

                    listItem.innerHTML = `
                        <input type="checkbox" ${todo.completed ? 'checked' : ''} data-index="${index}">
                        <span>${todo.text}</span>
                        <button class="delete-btn" data-index="${index}">삭제</button>
                    `;
                    todoList.appendChild(listItem);
                });
            }

            // 할 일 추가
            addTodoBtn.addEventListener('click', () => {
                const todoText = newTodoInput.value.trim();
                if (todoText !== '') {
                    todos.push({ text: todoText, completed: false });
                    newTodoInput.value = ''; // 입력 필드 초기화
                    saveTodos();
                    renderTodos();
                }
            });

            // Enter 키로 할 일 추가
            newTodoInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    addTodoBtn.click();
                }
            });

            // 할 일 완료/삭제 처리 (이벤트 위임)
            todoList.addEventListener('click', (e) => {
                if (e.target.type === 'checkbox') {
                    const index = e.target.dataset.index;
                    todos[index].completed = e.target.checked;
                    saveTodos();
                    renderTodos(); // 상태 변경 후 다시 렌더링하여 스타일 적용
                } else if (e.target.classList.contains('delete-btn')) {
                    const index = e.target.dataset.index;
                    todos.splice(index, 1); // 해당 인덱스의 할 일 삭제
